name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # هاد الجزء هو اللي غيصلح الصراعات ديال المكتبات اللي فالتصويرة
      - name: Repair and Upgrade Dependencies
        run: |
          flutter pub upgrade --major-versions
          flutter pub get

      # بناء التطبيق مع تجاهل التنبيهات القديمة
      - name: Build APK
        run: flutter build apk --debug --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khenifra-heritage-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
