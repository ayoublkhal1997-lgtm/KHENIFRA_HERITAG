name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11' # رجعنا لـ 11 للتوافق

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.7.12' # هاد النسخة "جوهرة" حيت كتقبل القديم والجديد

      - name: Force Build
        run: |
          flutter pub get
          flutter build apk --debug --no-sound-null-safety --ignore-deprecation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khenifra-heritage-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
