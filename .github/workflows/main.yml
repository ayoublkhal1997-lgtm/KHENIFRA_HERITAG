name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      # هاد السطر غادي يحل مشكل التوافق اللي بان في الصورة
      - run: flutter pub get --suppress-analytics
      
      # هاد السطر كيبني الـ APK وخا كاينين تنبيهات بسيطة
      - run: flutter build apk --debug --no-pub

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khenifra-heritage-apk
          path: build/app/outputs/flutter-apk/app-debug.apkter-apk/app-debug.apk
