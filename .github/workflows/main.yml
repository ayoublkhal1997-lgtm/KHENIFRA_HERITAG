name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: Recreate Android Folder & Build
        run: |
          # هاد الأوامر كتمسح العجز ديال Android v1 وكتقاد v2
          rm -rf android
          flutter create .
          flutter pub get
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khenifra-heritage-app
          path: build/app/outputs/flutter-apk/app-debug.apk
          
